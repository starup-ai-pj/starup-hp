<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ORBIT — Diorama</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:           #eef0ec;
    --ink:          #15140f;
    --ink-soft:     rgba(21,20,15,.62);
    --ink-mute:     rgba(21,20,15,.42);
    --ink-line:     rgba(21,20,15,.08);
    --svc-accent:   #10a571;     /* orbit emerald */
    --svc-accent-2: #f5b342;     /* secondary amber */
    --diorama-depth: 2.2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP","Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{ min-height:100vh; display:grid; place-items:center; padding: 40px;}
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(16,165,113,.13), transparent 60%),
      radial-gradient(900px 600px at 0% 30%, rgba(245,179,66,.07), transparent 60%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(rgba(20,18,10,.05) 1px, transparent 1px);
    background-size: 3px 3px; opacity:.35; mix-blend-mode:multiply;
  }
  .wrap{ position:relative; z-index:1; width:100%; max-width: 820px;}

  /* ===== Stage ===== */
  .stage{ position:relative; height: 620px; perspective: 1800px; perspective-origin: 50% 45%;}
  .stage-orb{ position:absolute; border-radius:50%; filter: blur(50px); opacity:.55; pointer-events:none; z-index:0;}
  .stage-orb.a{ width: 340px; height:340px; left:-70px; top:-40px;
    background: radial-gradient(circle, var(--svc-accent), transparent 70%);}
  .stage-orb.b{ width: 320px; height: 320px; right:-50px; bottom:20px;
    background: radial-gradient(circle, var(--svc-accent-2), transparent 70%); opacity:.4;}
  .deck{ position:absolute; inset:0; transform-style:preserve-3d;}

  /* ===== Main card ===== */
  .layer-card{ position:absolute; left: 20px; top: 30px; width: 640px; height: 440px;
    border-radius: 14px; background: #fff;
    border: .5px solid rgba(255,255,255,.9);
    box-shadow:
      0 1px 0 rgba(255,255,255,.85) inset,
      0 0 0 .5px rgba(255,255,255,.6) inset,
      0 40px 70px -22px rgba(15,14,8,.32),
      0 18px 30px -18px rgba(15,14,8,.2);
    overflow:hidden; transform-style:preserve-3d; will-change: transform;
    transform: translate3d(0, 0, 40px);
  }

  /* App chrome */
  .app{ display:grid; grid-template-rows: 32px 1fr; height:100%; transform-style:preserve-3d;}
  .app-top{ display:flex; align-items:center; padding: 0 10px; gap: 8px;
    background: #fff; border-bottom: .5px solid var(--ink-line); overflow:hidden;
    transform: translateZ(calc(12px * var(--diorama-depth,1)));}
  .app-top .back{ color: var(--ink-soft); font-size: 12px; width:18px; text-align:center; flex-shrink:0;}
  .app-top .ttl{ font-size: 11px; font-weight: 600; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; max-width: 200px;}
  .app-top .pub{ font-size: 7.5px; padding: 2px 6px; border-radius: 999px;
    background: var(--svc-accent); color:#fff; font-weight: 600; letter-spacing:.06em;
    font-family:"JetBrains Mono", monospace; white-space:nowrap; flex-shrink:0;}
  .app-top .right{ margin-left:auto; display:flex; align-items:center; gap:5px; flex-shrink:0;}
  .app-top .ic{ width:20px; height:20px; border-radius:5px; display:grid; place-items:center;
    color: var(--ink-soft); font-size:11px;}
  .app-top .ic.amber{ background: var(--svc-accent-2); color:#fff;}
  .app-top .save{ height: 22px; padding: 0 10px; border-radius: 6px;
    background: var(--svc-accent); color: #fff; font-size: 9.5px; font-weight: 600;
    display:flex; align-items:center; gap:4px;
    transform: translateZ(calc(40px * var(--diorama-depth,1)));
    box-shadow: 0 18px 26px -10px color-mix(in oklch, var(--svc-accent) 60%, transparent);}
  .app-top .pill-toggle{ display:flex; background: rgba(245,179,66,.15); border-radius: 7px; padding: 2px;
    transform: translateZ(calc(28px * var(--diorama-depth,1)));}
  .app-top .pill-toggle .pt{ padding: 2px 8px; font-size: 9px; font-weight:500; color:var(--ink-soft);
    border-radius: 5px; display:flex; align-items:center; gap:3px;}
  .app-top .pill-toggle .pt.on{ background: var(--svc-accent-2); color:#fff;}

  .app-body{ display:grid; grid-template-columns: var(--left,150px) 1fr var(--right,150px);
    transform-style:preserve-3d; min-height:0; overflow:hidden;}

  /* Side panels */
  .panel{ background: #fff; border-right: .5px solid var(--ink-line);
    padding: 10px 8px; display:flex; flex-direction:column; gap:7px; overflow:hidden;
    transform-style:preserve-3d; min-height:0;
    transform: translateZ(calc(24px * var(--diorama-depth,1)));}
  .panel.right{ border-right: none; border-left: .5px solid var(--ink-line);}
  .panel .ptitle{ font-size: 11px; font-weight:700; color:var(--ink); display:flex; align-items:center;
    justify-content:space-between; padding-bottom: 4px; white-space:nowrap;}
  .panel .ptitle .x{ color:var(--ink-mute); font-size:11px;}
  .panel .psub{ font-size: 8px; color: var(--ink-mute); margin-top:-4px; margin-bottom: 4px; white-space:nowrap;}
  .panel .search{ height: 22px; padding: 0 8px; border-radius: 6px;
    border: .5px solid rgba(20,18,10,.1); background: #fff; display:flex; align-items:center;
    font-size: 8.5px; color: var(--ink-mute); gap: 5px;}
  .panel .pcat{ font-size: 9px; color: var(--svc-accent); font-weight:600; display:flex;
    align-items:center; gap: 4px; margin-top: 4px;}
  .panel .pcat .num{ background: var(--svc-accent-2); color: #fff; font-size:7px;
    padding: 1px 5px; border-radius: 999px; font-weight:600;}
  .panel .pcat .chev{ margin-left:auto; color: var(--ink-mute);}

  /* Canvas */
  .canvas{ background: #f8f8f6; padding: 10px; overflow:hidden; transform-style:preserve-3d;
    position: relative; min-height: 0;}

  /* ===== Screen 1: App Builder ===== */
  .ab-widgets{ display:flex; flex-direction:column; gap:5px;}
  .ab-w{ background:#fff; border-radius: 5px; padding: 5px 7px; display:flex; align-items:center; gap:6px;
    border:.5px solid rgba(20,18,10,.06);}
  .ab-w .ic{ width:16px; height:16px; border-radius:4px; background: rgba(16,165,113,.1);
    display:grid; place-items:center; color: var(--svc-accent); font-size:9px;}
  .ab-w .n{ font-size: 8.5px; font-weight: 600;}
  .ab-w .s{ font-size: 7px; color: var(--ink-mute); margin-top:1px;}
  .ab-w-text{ flex:1; min-width:0;}

  .ab-canvas{ display:grid; grid-template-columns: 1fr 1fr; gap: 8px; height: 100%;
    transform-style:preserve-3d;}
  .ab-card{ background: #fff; border-radius: 8px; padding: 10px 11px; transform-style:preserve-3d;
    box-shadow: 0 14px 22px -10px rgba(15,14,8,.16), inset 0 0 0 .5px rgba(20,18,10,.05);
    display:flex; flex-direction:column; gap:6px;}
  .ab-card .hd{ display:flex; align-items:center; gap:5px; font-size:8.5px; color:var(--ink-soft);}
  .ab-card .hd .ic{ width:14px; height:14px; border-radius:3px; background: rgba(16,165,113,.1);
    color: var(--svc-accent); display:grid; place-items:center; font-size:9px;}
  .ab-card .hd .ic.bar{ background: rgba(96,140,255,.15); color: #5b88ff;}
  .ab-card .hd .ic.tbl{ background: rgba(245,179,66,.15); color: var(--svc-accent-2);}
  .ab-card .hd .grip{ color: var(--ink-mute); margin-right:auto;}
  .ab-card.kpi{ align-items:center; justify-content:center; gap:0; transform: translateZ(calc(56px * var(--diorama-depth,1)));
    box-shadow: 0 28px 38px -12px rgba(15,14,8,.28);}
  .ab-card.kpi .lbl{ font-size: 9px; color: var(--ink-mute); letter-spacing:.16em; font-weight: 700;
    margin-top:14px; font-family:"JetBrains Mono", monospace;}
  .ab-card.kpi .val{ font-family:"Space Grotesk", sans-serif; font-weight: 700; font-size: 56px;
    line-height: 1; color: var(--ink); letter-spacing: -.04em;
    transform: translateZ(calc(40px * var(--diorama-depth,1)));}
  .ab-card.kpi .hd{ position:absolute; top: 8px; left: 11px; right: 11px;}
  .ab-card.kpi{ position:relative;}
  .ab-card.bar{ transform: translateZ(calc(86px * var(--diorama-depth,1))) rotateY(-2deg);
    box-shadow: 0 42px 58px -16px rgba(15,14,8,.4);}
  .ab-bars{ flex:1; display:grid; grid-template-columns: 1fr 1fr; gap: 16px;
    align-items:end; padding: 4px 14px 10px; position:relative;}
  .ab-bars .ax{ position:absolute; left:4px; top: 4px; bottom: 18px;
    display:flex; flex-direction:column; justify-content:space-between; font-size: 6.5px;
    color: var(--ink-mute); font-family:"JetBrains Mono", monospace;}
  .ab-bars .b{ background: linear-gradient(180deg, #5b88ff 0%, #6a8bff 100%); border-radius: 3px 3px 0 0;
    transform: translateZ(calc(30px * var(--diorama-depth,1)));
    box-shadow: 0 10px 18px -6px rgba(91,136,255,.5);}
  .ab-bars .b.h1{ height: 86%;}
  .ab-bars .b.h2{ height: 92%;}
  .ab-bars .lbl{ position:absolute; bottom: 4px; font-size: 7px; color: var(--ink-soft);}
  .ab-bars .lbl.l1{ left: 20%;}
  .ab-bars .lbl.l2{ right: 22%;}

  .ab-card.tbl{ grid-column: span 2; transform: translateZ(calc(34px * var(--diorama-depth,1)));
    box-shadow: 0 22px 32px -12px rgba(15,14,8,.28);}
  .ab-tbl-hd{ display:grid; grid-template-columns: 70px 80px 1fr 50px; padding: 4px 4px 6px;
    border-bottom: .5px solid var(--ink-line); font-size: 7px; color: var(--ink-mute);
    font-family:"JetBrains Mono", monospace; letter-spacing: .05em; font-weight: 600;}
  .ab-tbl-row{ display:grid; grid-template-columns: 70px 80px 1fr 50px; padding: 6px 4px;
    font-size: 8px; color: var(--ink); align-items:center;
    transform: translateZ(calc(20px * var(--diorama-depth,1)));}
  .ab-tbl-row .actions{ display:flex; gap: 5px; color: var(--ink-mute);}

  /* Right settings panel */
  .ab-setting{ display:flex; flex-direction:column; gap: 4px;}
  .ab-setting .lbl{ font-size: 8.5px; color: var(--ink); font-weight: 600;}
  .ab-setting .field{ height: 22px; padding: 0 8px; border-radius: 5px;
    border: .5px solid rgba(20,18,10,.1); background:#fff; font-size: 8px; color: var(--ink);
    display:flex; align-items:center; justify-content:space-between;}
  .ab-setting .field .chev{ color: var(--ink-mute);}
  .ab-setting .field.dark{ background:#f5f3ee;}
  .ab-setting .toggle{ display:flex; align-items:center; justify-content:space-between;
    font-size: 8.5px;}
  .ab-setting .tg{ width: 22px; height: 12px; border-radius: 999px; background: var(--svc-accent);
    position:relative;}
  .ab-setting .tg::after{ content:""; position:absolute; top:2px; right:2px; width:8px; height:8px;
    border-radius:50%; background:#fff;}
  .ab-setting .add-btn{ padding: 4px 0; font-size: 8.5px; color: var(--ink-soft);
    border: .5px dashed rgba(20,18,10,.18); border-radius: 5px; text-align:center;}
  .ab-setting .add-link{ color: var(--svc-accent); font-size: 8.5px; font-weight:500;}

  /* ===== Screen 2: Workflow ===== */
  .wf-nodes{ display:flex; flex-direction:column; gap:6px;}
  .wf-n{ background:#fff; border-radius: 8px; padding: 7px 8px; display:flex; align-items:center; gap:6px;
    box-shadow: 0 6px 10px -6px rgba(15,14,8,.15), inset 0 0 0 .5px rgba(20,18,10,.06);}
  .wf-n .ic{ width:18px; height:18px; border-radius:4px;
    display:grid; place-items:center; color:#fff; font-size:10px;}
  .wf-n .ic.trig{ background: var(--svc-accent-2);}
  .wf-n .ic.ai{ background: var(--svc-accent);}
  .wf-n .n{ font-size: 8.5px; font-weight:500; color: var(--ink);}
  .wf-cat{ font-size: 9px; color: var(--ink-mute); font-weight:600; letter-spacing:.04em; margin-top:6px;}

  .wf-canvas{ position:relative; background:
    radial-gradient(rgba(20,18,10,.07) 1px, transparent 1px) 0 0 / 12px 12px,
    linear-gradient(180deg, #fafaf6, #f3f5f0);
    transform-style:preserve-3d; padding: 8px;}

  .wf-node{ position:absolute; background:#fff; border-radius: 8px; padding: 7px 9px;
    border: .5px solid rgba(20,18,10,.1); transform-style:preserve-3d; width: 132px;
    box-shadow: 0 14px 22px -10px rgba(15,14,8,.2);}
  .wf-node .top{ display:flex; align-items:center; gap:5px;}
  .wf-node .top .ic{ width:14px; height:14px; border-radius:4px; display:grid; place-items:center;
    color:#fff; font-size:9px;}
  .wf-node .top .name{ font-size: 8.5px; font-weight: 600;}
  .wf-node .tag{ display:inline-block; background: var(--svc-accent-2); color:#fff;
    padding: 1px 5px; border-radius: 3px; font-size: 6.5px; font-weight: 600; margin-top: 3px;
    font-family:"JetBrains Mono", monospace;}
  .wf-node .desc{ font-size: 7px; color: var(--ink-soft); margin-top:3px; line-height: 1.4;
    overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;}
  .wf-node.trigger{ background: linear-gradient(160deg, #d3e3f6, #e2eaf7);}
  .wf-node.trigger .ic{ background: #5b88ff;}
  .wf-node.ai .ic{ background: var(--svc-accent);}
  .wf-node.review{ background: #ece3d8;}
  .wf-node.review .ic{ background: #c9a575;}
  .wf-node.wait{ background: #e6d8f0;}
  .wf-node.wait .ic{ background: #9d72d3;}
  .wf-node.decision{ background: #fff5dc; border: 1.5px solid var(--svc-accent);}
  .wf-node.decision .ic{ background: var(--svc-accent-2);}

  .wf-edge{ position:absolute; pointer-events:none; transform-style:preserve-3d;}

  /* Right AI assistant panel */
  .ai-asst{ display:flex; flex-direction:column; gap:8px; height: 100%;}
  .ai-asst .top{ display:flex; align-items:center; justify-content:space-between;}
  .ai-asst .top .ttl{ display:flex; align-items:center; gap:5px; font-size:10px; font-weight:600;}
  .ai-asst .top .ttl .sp{ color: var(--svc-accent); font-size: 11px;}
  .ai-asst .iconrow{ display:flex; gap: 4px;}
  .ai-asst .iconrow .ic{ width:18px; height:18px; border-radius:5px;
    display:grid; place-items:center; color: var(--ink-soft); font-size:11px;}
  .ai-asst .iconrow .ic.on{ background: var(--svc-accent); color:#fff;}
  .ai-asst .splash{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:6px; padding: 10px;}
  .ai-asst .splash .big-ic{ width:36px; height:36px; border-radius:50%;
    background: rgba(16,165,113,.08); display:grid; place-items:center; font-size:20px; color: var(--svc-accent);
    transform: translateZ(calc(40px * var(--diorama-depth,1)));
    box-shadow: 0 20px 28px -10px color-mix(in oklch, var(--svc-accent) 40%, transparent);}
  .ai-asst .splash h4{ margin: 0; font-size: 10.5px; font-weight:700;}
  .ai-asst .splash p{ margin: 0; font-size: 8.5px; color: var(--ink-soft); line-height: 1.6;}
  .ai-asst .splash .hint{ font-size: 7.5px; color: var(--ink-mute);}
  .ai-asst .prompts{ display:flex; flex-direction:column; gap:5px;}
  .ai-asst .pr{ background:#fff; border: .5px solid rgba(20,18,10,.1); border-radius: 6px;
    padding: 7px 9px; font-size: 8.5px; color: var(--ink); transform-style:preserve-3d;}
  .ai-asst .pr:nth-child(1){ transform: translateZ(calc(34px * var(--diorama-depth,1))) rotateY(-2deg);
    box-shadow: 0 24px 32px -14px rgba(15,14,8,.32);}
  .ai-asst .pr:nth-child(2){ transform: translateZ(calc(56px * var(--diorama-depth,1)));
    box-shadow: 0 32px 40px -14px rgba(15,14,8,.4);}
  .ai-asst .pr:nth-child(3){ transform: translateZ(calc(80px * var(--diorama-depth,1))) rotateY(2deg);
    box-shadow: 0 44px 54px -14px rgba(15,14,8,.46);}
  .ai-asst .pinput{ margin-top: auto; height: 28px; border: 1.5px solid var(--svc-accent);
    border-radius: 6px; display:flex; align-items:center; padding: 0 8px; gap: 6px;
    font-size: 8px; color: var(--ink-mute); background:#fff;
    transform: translateZ(calc(60px * var(--diorama-depth,1)));
    box-shadow: 0 26px 34px -14px rgba(15,14,8,.32);}
  .ai-asst .pinput .send{ margin-left:auto; width: 18px; height:18px; border-radius: 4px;
    background: var(--svc-accent); color: #fff; display:grid; place-items:center; font-size: 10px;}

  /* ===== Screen 3: ERD ===== */
  .er-list{ display:flex; flex-direction:column; gap: 5px;}
  .er-pill-row{ display:flex; gap: 4px; flex-wrap:wrap;}
  .er-pill{ font-size: 7.5px; padding: 3px 7px; border-radius: 999px;
    background: rgba(20,18,10,.05); color: var(--ink-soft); white-space:nowrap;}
  .er-pill.on{ background: rgba(16,165,113,.12); color: var(--svc-accent); font-weight: 600;}
  .er-vis{ display:flex; gap: 10px; align-items:center; margin-top: 3px; font-size: 8px;
    color: var(--ink-soft);}
  .er-vis .v{ display:flex; align-items:center; gap: 3px;}
  .er-add-btn{ padding: 6px; font-size: 8.5px; color: var(--ink); border: .5px dashed rgba(20,18,10,.18);
    border-radius: 5px; text-align:center; font-weight: 500; margin-top: 3px;
    display:flex; align-items:center; justify-content:center; gap:4px;}

  .er-group{ font-size: 8.5px; font-weight: 600; color: var(--ink-soft); display:flex;
    align-items:center; gap: 5px; margin-top: 4px; padding: 3px 0;
    border-top: .5px solid var(--ink-line);}
  .er-group .chev{ font-size: 7px;}
  .er-group .count{ margin-left:auto; font-size: 7.5px; color: var(--ink-mute);
    font-family: "JetBrains Mono", monospace;}
  .er-item{ display:flex; align-items:center; gap:5px; font-size: 8.5px; color: var(--ink);
    padding: 2px 4px;}
  .er-item.dim{ color: var(--ink-mute);}
  .er-item .eye{ font-size: 9px; color: var(--ink-mute);}
  .er-item .dot{ width: 6px; height: 6px; border-radius: 50%;}

  .er-canvas{ background:
    radial-gradient(rgba(20,18,10,.06) 1px, transparent 1px) 0 0 / 10px 10px,
    #f5f6f1;
    transform-style:preserve-3d; padding: 12px; min-height: 0; overflow:hidden;
    position: relative;}

  /* Region containers */
  .er-region{ position:absolute; border-radius: 10px; border: .5px dashed var(--er-c, #5b88ff);
    background: color-mix(in oklch, var(--er-c, #5b88ff) 8%, transparent);
    transform-style:preserve-3d; padding: 16px 8px 6px;}
  .er-region .rlbl{ position:absolute; top: -7px; left: 8px; background: var(--er-c, #5b88ff);
    color: #fff; font-size: 6.5px; padding: 1px 7px; border-radius: 999px; font-weight: 600;
    font-family: "JetBrains Mono", monospace;}

  .er-entity{ background: var(--ent-bg, #fff); border-radius: 7px; padding: 4px 6px;
    transform-style:preserve-3d; min-width: 90px;
    box-shadow: 0 16px 22px -10px rgba(15,14,8,.22), inset 0 0 0 .5px rgba(255,255,255,.85);
    border-top: 2px solid var(--ent-c, var(--svc-accent));}
  .er-entity .head{ display:flex; align-items:center; gap:4px; font-size: 8px; font-weight: 700;
    color: var(--ent-c, var(--svc-accent));}
  .er-entity .head .dot{ width: 4px; height: 4px; border-radius: 50%; background: var(--ent-c, var(--svc-accent));}
  .er-entity .sub{ font-size: 6px; color: var(--ink-mute); margin-left: 8px;
    font-family: "JetBrains Mono", monospace;}
  .er-entity .tags{ display:flex; gap: 2px; margin-left: 8px; margin-top:1px;}
  .er-entity .tags .tag{ font-size: 5.5px; padding: 1px 3px; border-radius: 2px;
    background: rgba(20,18,10,.05); color: var(--ink-soft);
    font-family:"JetBrains Mono", monospace;}
  .er-entity .prop{ display:flex; align-items:center; gap: 4px; font-size: 7px;
    padding: 2px 0; border-top: .5px solid var(--ink-line); margin-top: 3px;}
  .er-entity .prop:first-of-type{ border-top: 0; margin-top: 2px;}
  .er-entity .prop .key{ font-size: 8px; color: var(--svc-accent-2);}
  .er-entity .prop .name{ flex:1; color: var(--ink);}
  .er-entity .prop .typ{ font-size: 5.5px; color: var(--ink-mute); background: rgba(20,18,10,.05);
    padding: 1px 3px; border-radius: 2px; font-family:"JetBrains Mono",monospace;}

  /* Bottom legend */
  .er-legend{ position:absolute; left: 0; right: 0; bottom: 0; padding: 5px 10px;
    background: rgba(255,255,255,.85); border-top: .5px solid var(--ink-line);
    display:flex; gap:10px; font-size: 7px; color: var(--ink-soft); align-items:center;

// ===== Diorama =====
const SCREENS = [
  {
    label: 'カスタムアプリ',
    path: 'apps/dashboard',
    tilt: { rx: -10, ry: 14 },
    render: () => <AppBuilderScreen />,
    floats: [
      { kind:'badge',  x: 580, y: 0,   z: 63, node: (<><span className="l">No-Code</span><span className="v">46 <em>widgets</em></span></>) },
      { kind:'chip',   x: -20, y: 60,  z: 50, node: (<><span className="dot"></span>ドラッグで完成</>) },
      { kind:'note',   x: 560, y: 320, z: 59, node: (<><div className="h">Data-Bound</div>オントロジー自動接続</>) },
      { kind:'pill',   x: -10, y: 460, z: 54, node: (<><i>✓</i> Published</>) },
    ],
  },
  {
    label: 'ワークフロー',
    path: 'workflows/補助金申請',
    tilt: { rx: -4, ry: -18 },
    render: () => <WorkflowScreen />,
    floats: [
      { kind:'spark',  x: -22, y: 26,  z: 68, node: '✦' },
      { kind:'note',   x: 580, y: 10,  z: 63, node: (<><div className="h">AI Agents</div>判断と実行を監査可能に</>) },
      { kind:'chip',   x: -20, y: 320, z: 50, node: (<><span className="dot"></span>8 nodes · 3 conditions</>) },
      { kind:'btn',    x: 540, y: 440, z: 70, node: (<><span className="ico">▶</span>実行する</>) },
    ],
  },
  {
    label: 'オントロジー',
    path: 'schema/ER図',
    tilt: { rx: -14, ry: 6 },
    render: () => <ERDScreen />,
    floats: [
      { kind:'pill',   x: -24, y: 30,  z: 59, node: (<><i>⬢</i>10 エンティティ</>) },
      { kind:'badge',  x: 580, y: 0,   z: 63, node: (<><span className="l">Semantic</span><span className="v">3 <em>relations</em></span></>) },
      { kind:'note',   x: -10, y: 460, z: 65, node: (<><div className="h">Ontology</div>業務概念をスキーマに</>) },
      { kind:'chip',   x: 570, y: 330, z: 52, node: (<><span className="dot"></span>意味論ベース統合</>) },
    ],
  },
];

function Diorama() {
  const [active, setActive] = useState(0);
  const stageRef = useRef(null);
  const [tilt, setTilt] = useState(SCREENS[0].tilt);
  const [paused, setPaused] = useState(false);

  useEffect(() => { setTilt(SCREENS[active].tilt); }, [active]);

  useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const dx = ((e.clientX - r.left) / r.width - 0.5) * 2;
      const dy = ((e.clientY - r.top) / r.height - 0.5) * 2;
      const bt = SCREENS[active].tilt;
      setTilt({ rx: bt.rx - dy * 6, ry: bt.ry + dx * 8 });
    };
    const onLeave = () => setTilt(SCREENS[active].tilt);
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
    };
  }, [active]);

  useEffect(() => {
    if (paused) return undefined;
    const id = setInterval(() => setActive(a => (a + 1) % SCREENS.length), 2500);
    return () => clearInterval(id);
  }, [paused]);

  useEffect(() => {
    const onMessage = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === 'set-screen' && typeof d.index === 'number') {
        if (d.index >= 0 && d.index < SCREENS.length) {
          setPaused(true);
          setActive(d.index);
        }
      } else if (d.type === 'resume') {
        setPaused(false);
      }
    };
    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, []);

  useEffect(() => {
    try { window.parent.postMessage({ type: 'screen-changed', index: active }, '*'); } catch (_) {}
  }, [active]);

  const screen = SCREENS[active];

  return (
    <div ref={stageRef} className="stage"
         onMouseEnter={() => setPaused(true)}
         onMouseLeave={() => setPaused(false)}>
      <div className="stage-orb a"></div>
      <div className="stage-orb b"></div>
      <div className="deck" style={{ transform: `rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg)`, transition:'transform .9s cubic-bezier(.2,.7,.2,1)' }}>
        <div className="layer-card" key={`card-${active}`}>
          {screen.render()}
        </div>
        {screen.floats.map((f, i) => (
          <div key={`f-${active}-${i}`}
               className={`float ${f.kind}`}
               style={{
                 left: f.x, top: f.y,
                 transform: `translate3d(0,0,${f.z}px)`,
                 animationDelay: `${i * 80}ms`,
               }}>
            {f.node}
          </div>
        ))}
      </div>
      <div className="tabrow">
        {SCREENS.map((s, i) => (
          <button key={i} className="tab"
                  data-active={i === active ? '1' : '0'}
                  onClick={() => setActive(i)}
                  onMouseEnter={() => setActive(i)}>
            <span className="idx">0{i+1}</span>
            <span>{s.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Diorama />);
</script>
