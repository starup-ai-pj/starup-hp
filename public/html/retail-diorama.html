<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PULSE — Diorama</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:           #f3f1ec;
    --ink:          #15140f;
    --ink-soft:     rgba(21,20,15,.62);
    --ink-mute:     rgba(21,20,15,.42);
    --ink-line:     rgba(21,20,15,.08);
    --svc-accent:   #ef4d4d;     /* pulse coral */
    --svc-accent-2: #f59e3a;     /* secondary amber */
    --good:         #1db77c;
    --info:         #4a8bff;
    --warn:         #f5b342;
    --diorama-depth: 2.2;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Noto Sans JP","Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
  body{ min-height:100vh; display:grid; place-items:center; padding: 40px;}
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(1200px 700px at 80% -10%, rgba(239,77,77,.13), transparent 60%),
      radial-gradient(900px 600px at 0% 30%, rgba(245,158,58,.08), transparent 60%);
  }
  body::after{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:0;
    background-image: radial-gradient(rgba(20,18,10,.05) 1px, transparent 1px);
    background-size: 3px 3px; opacity:.35; mix-blend-mode:multiply;
  }
  .wrap{ position:relative; z-index:1; width:100%; max-width: 820px;}

  /* ===== Stage ===== */
  .stage{ position:relative; height: 620px; perspective: 1800px; perspective-origin: 50% 45%;}
  .stage-orb{ position:absolute; border-radius:50%; filter: blur(50px); opacity:.55; pointer-events:none; z-index:0;}
  .stage-orb.a{ width: 340px; height:340px; left:-70px; top:-40px;
    background: radial-gradient(circle, var(--svc-accent), transparent 70%);}
  .stage-orb.b{ width: 320px; height: 320px; right:-50px; bottom:20px;
    background: radial-gradient(circle, var(--svc-accent-2), transparent 70%); opacity:.4;}
  .deck{ position:absolute; inset:0; transform-style:preserve-3d;}

  /* ===== Main card ===== */
  .layer-card{ position:absolute; left: 20px; top: 30px; width: 640px; height: 440px;
    border-radius: 14px; background: #fff;
    border: .5px solid rgba(255,255,255,.9);
    box-shadow:
      0 1px 0 rgba(255,255,255,.85) inset,
      0 0 0 .5px rgba(255,255,255,.6) inset,
      0 40px 70px -22px rgba(15,14,8,.32),
      0 18px 30px -18px rgba(15,14,8,.2);
    overflow:hidden; transform-style:preserve-3d; will-change: transform;
    transform: translate3d(0, 0, 40px);
  }

  /* App chrome */
  .app{ display:grid; grid-template-columns: 40px 1fr; height:100%; transform-style:preserve-3d;}
  .sidebar{ background: var(--svc-accent); display:flex; flex-direction:column; align-items:center;
    padding: 10px 0; gap: 4px; position:relative;
    transform: translateZ(calc(20px * var(--diorama-depth,1)));}
  .sidebar .logo{ width:24px; height:24px; margin-bottom:4px; display:grid; place-items:center;}
  .sidebar .group{ font-size: 7.5px; color: rgba(255,255,255,.65); margin-top: 6px; font-weight:600;
    letter-spacing: .04em;}
  .sidebar .ico{ width:30px; height:30px; border-radius:6px; display:grid; place-items:center;
    color:rgba(255,255,255,.78); position:relative;}
  .sidebar .ico.on{ background: rgba(255,255,255,.18); color:#fff;}
  .sidebar .ico svg{ width:16px; height:16px;}
  .sidebar .spacer{ flex:1;}

  .content{ display:flex; flex-direction:column; min-width:0; transform-style:preserve-3d;
    position:relative; background: #f7f5f0;}

  /* Top header bar */
  .topbar{ display:flex; align-items:center; gap: 8px; padding: 8px 14px; background:#fff;
    border-bottom: .5px solid var(--ink-line); overflow:hidden;
    transform: translateZ(calc(14px * var(--diorama-depth,1)));}
  .topbar h2{ margin: 0; font-size: 13px; font-weight:700; letter-spacing:-.005em; white-space:nowrap;}
  .topbar .breadcrumb{ color: var(--ink-soft); font-size: 9px; margin-top: 1px;}
  .topbar .sub{ font-size: 7.5px; color: var(--ink-mute); margin-top: 1px;
    font-family:"JetBrains Mono", monospace; white-space:nowrap;}
  .topbar .right{ margin-left:auto; display:flex; gap:6px; align-items:center; flex-shrink:0;}
  .topbar .iconbtn{ height: 22px; padding: 0 9px; border-radius: 6px; background:#fff;
    border: .5px solid rgba(20,18,10,.1); display:flex; align-items:center; gap:5px;
    font-size: 9px; color: var(--ink); font-weight:500; white-space:nowrap; flex-shrink:0;}
  .topbar .iconbtn .ic{ font-size:10px; color: var(--ink-soft);}
  .topbar .iconbtn.solid{ background: var(--svc-accent); color: #fff; border-color: transparent;
    transform: translateZ(calc(40px * var(--diorama-depth,1)));
    box-shadow: 0 18px 26px -10px color-mix(in oklch, var(--svc-accent) 60%, transparent);}
  .topbar .iconbtn.solid .ic{ color: #fff;}

  /* Body */
  .body-area{ flex:1; padding: 10px; overflow:hidden; transform-style:preserve-3d; min-height:0;}

  /* ===== Screen 1: Dashboard ===== */
  .ds-grid{ display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; transform-style:preserve-3d;}
  .ds-kpi{ background:#fff; border-radius: 8px; padding: 8px 10px; transform-style:preserve-3d;
    box-shadow: 0 14px 22px -10px rgba(15,14,8,.18), inset 0 0 0 .5px rgba(20,18,10,.05);
    border: .5px solid rgba(20,18,10,.04);}
  .ds-kpi .hd{ display:flex; align-items:center; gap: 4px; font-size: 7.5px; color: var(--ink-soft);}
  .ds-kpi .hd .ic{ color: var(--svc-accent); font-size: 9px;}
  .ds-kpi .v{ font-family:"Space Grotesk", sans-serif; font-weight: 700; font-size: 22px;
    margin-top: 2px; letter-spacing:-.03em; line-height:1;}
  .ds-kpi .v small{ font-size: 8px; color: var(--ink-mute); font-weight:500; margin-left: 2px;}
  .ds-kpi .trend{ display:flex; align-items:center; gap: 3px; font-size: 7px;
    color: var(--good); margin-top: 3px;}
  .ds-kpi:nth-child(1){ transform: translateZ(calc(96px * var(--diorama-depth,1))) rotateY(-2deg);
    box-shadow: 0 44px 56px -14px rgba(15,14,8,.42);}
  .ds-kpi:nth-child(2){ transform: translateZ(calc(70px * var(--diorama-depth,1)));
    box-shadow: 0 34px 44px -14px rgba(15,14,8,.36);}
  .ds-kpi:nth-child(3){ transform: translateZ(calc(52px * var(--diorama-depth,1)));
    box-shadow: 0 26px 36px -14px rgba(15,14,8,.32);}
  .ds-kpi:nth-child(4){ transform: translateZ(calc(38px * var(--diorama-depth,1))) rotateY(2deg);
    box-shadow: 0 22px 30px -14px rgba(15,14,8,.28);}

  .ds-charts{ display:grid; grid-template-columns: 1.55fr 1fr; gap: 8px; margin-top: 8px;
    transform-style:preserve-3d; height: calc(100% - 80px);}
  .ds-chart{ background:#fff; border-radius: 8px; padding: 9px 11px;
    display:flex; flex-direction:column; gap: 5px;
    box-shadow: 0 18px 28px -12px rgba(15,14,8,.22), inset 0 0 0 .5px rgba(20,18,10,.04);
    border: .5px solid rgba(20,18,10,.04);}
  .ds-chart .hd{ display:flex; align-items:center; gap: 5px; font-size: 9px; font-weight:600;}
  .ds-chart .hd .ic{ color: var(--svc-accent); font-size: 10px;}
  .ds-chart .hd .right{ margin-left:auto; display:flex; gap: 4px;}
  .ds-chart .hd .pill{ font-size: 7px; padding: 1px 5px; border-radius: 999px;
    background: rgba(20,18,10,.05); color: var(--ink-soft);}
  .ds-chart .body{ flex:1; position:relative;}
  .ds-chart.line{ transform: translateZ(calc(48px * var(--diorama-depth,1))) rotateY(-1deg);
    box-shadow: 0 28px 40px -14px rgba(15,14,8,.34);}
  .ds-chart.bars{ transform: translateZ(calc(76px * var(--diorama-depth,1))) rotateY(2deg);
    box-shadow: 0 38px 52px -14px rgba(15,14,8,.42);}

  /* Line chart */
  .ds-line svg{ width:100%; height:100%; display:block;}

  /* Bar chart */
  .ds-bars{ display:flex; align-items:flex-end; gap: 5px; height: 100%; padding-bottom: 14px; position:relative;}
  .ds-bars .b{ flex:1; background: linear-gradient(180deg, var(--svc-accent), color-mix(in oklch, var(--svc-accent) 75%, #000));
    border-radius: 3px 3px 0 0;
    box-shadow: 0 8px 14px -6px rgba(239,77,77,.5);}
  .ds-bars .lbl{ position:absolute; bottom: 0; font-size: 6px; color: var(--ink-mute);}

  /* Bottom rankings strip */
  .ds-rank{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 8px;
    transform-style:preserve-3d;}
  .ds-rk{ background:#fff; border-radius: 6px; padding: 6px 8px;
    box-shadow: 0 12px 20px -10px rgba(15,14,8,.18), inset 0 0 0 .5px rgba(20,18,10,.04);
    transform: translateZ(calc(28px * var(--diorama-depth,1)));
    font-size: 8.5px; display:flex; align-items:center; gap: 5px;}
  .ds-rk .ic{ width:16px; height:16px; border-radius:50%; background: var(--svc-accent-2);
    display:grid; place-items:center; color:#fff; font-size: 9px;}
  .ds-rk .t{ flex: 1; min-width: 0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    font-weight: 500;}
  .ds-rk .n{ font-family:"JetBrains Mono", monospace; font-size: 8px; color: var(--ink-soft);}

  /* ===== Screen 2: Product Master ===== */
  .pm-grid{ display:grid; grid-template-columns: 1.05fr 1.2fr; gap: 8px; height:100%; transform-style:preserve-3d;}
  .pm-list{ background:#fff; border-radius: 8px; padding: 0; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow: 0 16px 26px -10px rgba(15,14,8,.2), inset 0 0 0 .5px rgba(20,18,10,.05);
    transform: translateZ(calc(36px * var(--diorama-depth,1)));}
  .pm-list .lhd{ display:grid; grid-template-columns: 100px 1fr; padding: 6px 10px;
    border-bottom: .5px solid var(--ink-line); font-size: 8px; font-weight:600; color: var(--ink-soft);
    font-family:"JetBrains Mono", monospace; letter-spacing: .04em;}
  .pm-list .row{ display:grid; grid-template-columns: 16px 100px 1fr; padding: 5px 10px;
    align-items:center; font-size: 8.5px; gap: 5px; border-bottom: .5px solid rgba(20,18,10,.03);}
  .pm-list .row .chk{ width:9px; height:9px; border-radius:2px; border: 1px solid rgba(20,18,10,.2);}
  .pm-list .row.on{ background: rgba(239,77,77,.07);
    transform: translateZ(calc(34px * var(--diorama-depth,1)));
    box-shadow: 0 20px 28px -12px rgba(239,77,77,.32);
    position:relative; z-index:2;}
  .pm-list .row .code{ font-family:"JetBrains Mono", monospace; font-size: 8px;}
  .pm-list .row .name{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

  .pm-detail{ background:#fff; border-radius: 8px; padding: 9px 10px;
    display:flex; flex-direction:column; gap: 6px; transform-style:preserve-3d;
    box-shadow: 0 22px 34px -12px rgba(15,14,8,.26), inset 0 0 0 .5px rgba(20,18,10,.05);
    transform: translateZ(calc(58px * var(--diorama-depth,1))) rotateY(2deg);}
  .pm-detail .dhd{ display:flex; align-items:center; gap: 6px;}
  .pm-detail .dhd .name{ font-size: 11px; font-weight: 700;}
  .pm-detail .dhd .scope{ margin-left:auto; padding: 2px 8px; border-radius: 5px;
    border: .5px solid rgba(20,18,10,.1); font-size: 7.5px; color: var(--ink-soft); display:flex; align-items:center; gap: 3px;}
  .pm-kpis{ display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; transform-style:preserve-3d;}
  .pm-kpi{ background: linear-gradient(180deg, #f9f9f6, #f4f3ee); border-radius: 6px;
    padding: 6px 8px; text-align:center;
    box-shadow: inset 0 0 0 .5px rgba(20,18,10,.05); transform-style:preserve-3d;}
  .pm-kpi .l{ font-size: 7px; color: var(--ink-mute); letter-spacing: .04em;}
  .pm-kpi .v{ font-family:"Space Grotesk", sans-serif; font-weight: 700; font-size: 16px;
    color: var(--ink); letter-spacing:-.02em;}
  .pm-kpi .v small{ font-size: 7.5px; color: var(--ink-mute); margin-left: 1px;}
  .pm-kpi:nth-child(2){ transform: translateZ(calc(28px * var(--diorama-depth,1)));
    box-shadow: 0 18px 24px -12px rgba(15,14,8,.3), inset 0 0 0 .5px rgba(20,18,10,.05);
    background: #fff;}
  .pm-trend-box{ background:#f9f9f6; border-radius: 6px; padding: 7px 9px; flex:1;
    display:flex; flex-direction:column; gap: 4px; position:relative; transform-style:preserve-3d;}
  .pm-trend-head{ display:flex; align-items:center; gap: 5px;}
  .pm-trend-head .t{ font-size: 8.5px; font-weight:600;}
  .pm-trend-head .tabs{ margin-left:auto; display:flex; gap: 3px;}
  .pm-trend-head .tab{ font-size: 6.5px; padding: 2px 5px; border-radius: 3px;
    background: rgba(20,18,10,.04); color: var(--ink-soft); font-weight:500;}
  .pm-trend-head .tab.on{ background: var(--svc-accent); color:#fff;}
  .pm-trend-body{ flex:1; position:relative;}
  .pm-bars{ display:flex; align-items:flex-end; gap: 3px; height: 100%; padding: 4px 4px 12px 24px; position:relative;}
  .pm-bars .ax{ position:absolute; left: 2px; top: 4px; bottom: 14px;
    display:flex; flex-direction:column; justify-content:space-between; font-size: 6px; color: var(--ink-mute);
    font-family:"JetBrains Mono", monospace;}
  .pm-bars .b{ flex:1; background: var(--svc-accent); border-radius: 2px 2px 0 0;
    box-shadow: 0 4px 8px -3px rgba(239,77,77,.4);}
  .pm-bars .b.big{ background: linear-gradient(180deg, var(--svc-accent), color-mix(in oklch, var(--svc-accent) 75%, #000));
    transform: translateZ(calc(20px * var(--diorama-depth,1)));
    box-shadow: 0 10px 16px -4px rgba(239,77,77,.55);}
  .pm-bars .dt{ position:absolute; bottom: 0; font-size: 5.5px; color: var(--ink-mute);
    font-family:"JetBrains Mono", monospace;}
  .pm-callout{ position:absolute; left: 28px; top: 6px; display:flex; flex-direction:column; gap: 4px;
    transform: translateZ(calc(44px * var(--diorama-depth,1)));}
  .pm-callout .co{ background:#fff; border:.5px solid rgba(20,18,10,.08); border-radius: 5px;
    padding: 4px 7px; box-shadow: 0 14px 20px -10px rgba(15,14,8,.28);}
  .pm-callout .co .l{ font-size: 6.5px; color: var(--ink-mute);}
  .pm-callout .co .v{ font-family:"Space Grotesk", sans-serif; font-weight: 700; font-size: 11px;}

  /* ===== Screen 3: Replenishment / AI ===== */
  .rp-grid{ display:grid; grid-template-columns: 170px 1fr; gap: 8px; height:100%; transform-style:preserve-3d;}
  .rp-skus{ background:#fff; border-radius: 8px; padding: 8px; display:flex; flex-direction:column; gap: 5px;
    box-shadow: 0 16px 26px -10px rgba(15,14,8,.2), inset 0 0 0 .5px rgba(20,18,10,.05);
    transform: translateZ(calc(32px * var(--diorama-depth,1))); overflow:hidden;}
  .rp-skus h3{ margin:0 0 4px; font-size: 10px; font-weight:700;}
  .rp-sku{ padding: 5px 7px; border-radius: 5px; display:flex; gap: 4px; align-items:flex-start;
    background: #fff; border: .5px solid rgba(20,18,10,.05);
    transform-style:preserve-3d;
    box-shadow: 0 6px 10px -6px rgba(15,14,8,.15);}
  .rp-sku .info{ flex:1; min-width: 0;}
  .rp-sku .code{ font-family:"JetBrains Mono", monospace; font-size: 7.5px; color: var(--ink-mute);}
  .rp-sku .n{ font-size: 8.5px; font-weight:500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    margin-top: 1px;}
  .rp-sku .m{ font-size: 7px; color: var(--ink-mute); margin-top: 1px;
    font-family:"JetBrains Mono", monospace;}
  .rp-sku .bdg{ font-size: 6.5px; padding: 2px 5px; border-radius: 999px; font-weight: 600; align-self:flex-start;
    white-space:nowrap;}
  .bdg.ok{ background: rgba(29,183,124,.15); color: var(--good);}
  .bdg.risk{ background: rgba(239,77,77,.15); color: var(--svc-accent);}
  .bdg.move{ background: rgba(74,139,255,.15); color: var(--info);}
  .bdg.unset{ background: rgba(20,18,10,.08); color: var(--ink-soft);}
  .rp-sku.on{ background: rgba(239,77,77,.07); border: .5px solid rgba(239,77,77,.25);
    transform: translateZ(calc(46px * var(--diorama-depth,1)));
    box-shadow: 0 26px 34px -14px rgba(239,77,77,.32);}
  .rp-sku:nth-child(3){ transform: translateZ(calc(20px * var(--diorama-depth,1)));}
  .rp-sku:nth-child(4){ transform: translateZ(calc(34px * var(--diorama-depth,1)));}
  .rp-sku:nth-child(5){ transform: translateZ(calc(22px * var(--diorama-depth,1)));}
  .rp-sku:nth-child(6){ transform: translateZ(calc(28px * var(--diorama-depth,1)));}

  .rp-matrix{ background:#fff; border-radius: 8px; padding: 9px 9px 9px 9px;
    display:flex; flex-direction:column; gap: 4px; overflow:hidden;
    transform-style:preserve-3d;
    box-shadow: 0 22px 34px -12px rgba(15,14,8,.26), inset 0 0 0 .5px rgba(20,18,10,.05);
    transform: translateZ(calc(56px * var(--diorama-depth,1))) rotateY(2deg);}
  .rp-matrix .mhd{ display:flex; align-items:center; font-size: 10px; font-weight:700;}
  .rp-matrix .mhd .right{ margin-left:auto; display:flex; gap: 3px;}
  .rp-matrix .mhd .seg{ background: rgba(20,18,10,.05); border-radius: 4px; padding: 1px;
    display:flex; gap: 1px;}
  .rp-matrix .mhd .seg .s{ width:18px; height:14px; border-radius:3px; display:grid; place-items:center;
    color: var(--ink-soft); font-size:8px;}
  .rp-matrix .mhd .seg .s.on{ background: var(--svc-accent); color:#fff;}
  .rp-th{ display:grid; grid-template-columns: 60px 70px repeat(5, 1fr); gap: 4px;
    padding: 4px 0; border-bottom: .5px solid var(--ink-line); font-size: 7px; color: var(--ink-mute);
    font-family:"JetBrains Mono", monospace; font-weight: 600;}
  .rp-th .col{ text-align:center;}
  .rp-th .col .v{ font-size: 8px; color: var(--ink); font-weight: 700;
    font-family:"Noto Sans JP", sans-serif; margin-bottom: 1px;}
  .rp-th .col .sub{ display:flex; gap: 2px; justify-content:center;}
  .rp-row{ display:grid; grid-template-columns: 60px 70px repeat(5, 1fr); gap: 4px;
    padding: 3px 0; align-items:center; font-size: 7.5px; transform-style:preserve-3d;}
  .rp-row .code{ font-family:"JetBrains Mono", monospace; font-size: 7px; color: var(--ink-soft);}
  .rp-row .store{ font-size: 7.5px;}
  .rp-cell{ display:flex; align-items:center; justify-content:center; gap: 3px; font-size: 7.5px;}
  .rp-cell .from{ color: var(--ink-soft); font-weight: 500;}
  .rp-cell .to{ color: var(--ink); font-weight: 700;}
  .rp-cell .arr{ color: var(--ink-mute); font-size: 8px;}
  .rp-wk{ display:flex; align-items:center; gap: 2px; justify-content:center; font-size: 6.5px;
    font-family:"JetBrains Mono", monospace; font-weight: 600;}
  .rp-wk .w{ padding: 0 3px; border-radius: 2px;}
  .rp-wk .w.r{ color: var(--svc-accent); background: rgba(239,77,77,.12);}
  .rp-wk .w.y{ color: #b88300; background: rgba(245,179,66,.18);}
  .rp-wk .w.g{ color: var(--good); background: rgba(29,183,124,.14);}
  .rp-wk .w.b{ color: var(--info); background: rgba(74,139,255,.15);}
  .rp-wk .arr{ color: var(--ink-mute); font-size:7px;}
  .rp-row:nth-child(3){ transform: translateZ(calc(40px * var(--diorama-depth,1)));}
  .rp-row:nth-child(4){ transform: translateZ(calc(64px * var(--diorama-depth,1)));
    background: linear-gradient(90deg, rgba(239,77,77,.04), transparent);}
  .rp-row:nth-child(5){ transform: translateZ(calc(30px * var(--diorama-depth,1)));}
  .rp-row:nth-child(6){ transform: translateZ(calc(46px * var(--diorama-depth,1)));}
  .rp-row:nth-child(7){ transform: translateZ(calc(22px * var(--diorama-depth,1)));}
  .rp-row:nth-child(8){ transform: translateZ(calc(34px * var(--diorama-depth,1)));}

  /* ===== Floating bits around card ===== */
  .float{ position:absolute; transform-style:preserve-3d; will-change:transform;
    animation: float-in .6s cubic-bezier(.2,.7,.2,1) backwards;}
  @keyframes float-in {
    from { opacity:0; transform: translate3d(0,12px,0) scale(.92);}
    to   { opacity:1;}
  }
  .float.pill, .float.btn, .float.badge, .float.chip, .float.note{
    background: linear-gradient(160deg, rgba(255,255,255,.96), rgba(255,255,255,.82));
    border: .5px solid rgba(255,255,255,.9);
    -webkit-backdrop-filter: blur(20px) saturate(160%); backdrop-filter: blur(20px) saturate(160%);
    box-shadow: 0 1px 0 rgba(255,255,255,.85) inset, 0 22px 38px -14px rgba(15,14,8,.32),
                0 6px 14px -8px rgba(15,14,8,.18);
    color: var(--ink); font-family: inherit;
  }

                      <span className={"w "+c.cf}>{c.f}</span>
                      <span className="arr">→</span>
                      <span className={"w "+c.ct}>{c.t}</span>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
};

// ===== Diorama =====
const SCREENS = [
  {
    label: 'ダッシュボード',
    path: 'analytics/dashboard',
    tilt: { rx: -10, ry: 14 },
    render: () => <DashboardScreen />,
    floats: [
      { kind:'badge', x: 580, y: 0,   z: 65, node: (<><span className="l">今月売上</span><span className="v">¥6.6<em>M</em></span><span className="d">↗ +3.6%</span></>) },
      { kind:'chip',  x: -22, y: 60,  z: 52, node: (<><span className="dot"></span>14 店舗 リアルタイム</>) },
      { kind:'note',  x: 560, y: 320, z: 59, node: (<><div className="h">Integrated</div>POS・EC・在庫を一元化</>) },
      { kind:'pill',  x: -10, y: 460, z: 56, node: (<><i>↻</i> 5分毎更新</>) },
    ],
  },
  {
    label: '商品マスタ',
    path: 'products/CS-P001',
    tilt: { rx: -6, ry: -16 },
    render: () => <ProductMasterScreen />,
    floats: [
      { kind:'badge', x: 580, y: 0,   z: 65, node: (<><span className="l">在庫切れ</span><span className="v">2,920<em>日</em></span></>) },
      { kind:'chip',  x: -22, y: 30,  z: 52, node: (<><span className="dot"></span>100 SKU × 14 店舗</>) },
      { kind:'note',  x: -10, y: 460, z: 59, node: (<><div className="h">Drill-down</div>SKU×店舗×期間 分析</>) },
      { kind:'btn',   x: 540, y: 440, z: 65, node: (<><span className="ico">↗</span>店舗別を見る</>) },
    ],
  },
  {
    label: 'AI補充提案',
    path: 'replenish/2026-03-07',
    tilt: { rx: -14, ry: 10 },
    render: () => <ReplenishmentScreen />,
    floats: [
      { kind:'spark', x: -22, y: 26,  z: 70, node: '✦' },
      { kind:'note',  x: 580, y: 10,  z: 63, node: (<><div className="h">AI Proposal</div>14 店 · 100 SKU 一括最適化</>) },
      { kind:'chip',  x: -20, y: 320, z: 52, node: (<><span className="dot"></span>欠品リスク 3 件</>) },
      { kind:'btn',   x: 540, y: 440, z: 70, node: (<><span className="ico">✓</span>計画を確定</>) },
    ],
  },
];

function Diorama() {
  const [active, setActive] = useState(0);
  const stageRef = useRef(null);
  const [tilt, setTilt] = useState(SCREENS[0].tilt);
  const [paused, setPaused] = useState(false);

  useEffect(() => { setTilt(SCREENS[active].tilt); }, [active]);

  useEffect(() => {
    const el = stageRef.current;
    if (!el) return;
    const onMove = (e) => {
      const r = el.getBoundingClientRect();
      const dx = ((e.clientX - r.left) / r.width - 0.5) * 2;
      const dy = ((e.clientY - r.top) / r.height - 0.5) * 2;
      const bt = SCREENS[active].tilt;
      setTilt({ rx: bt.rx - dy * 6, ry: bt.ry + dx * 8 });
    };
    const onLeave = () => setTilt(SCREENS[active].tilt);
    el.addEventListener('mousemove', onMove);
    el.addEventListener('mouseleave', onLeave);
    return () => {
      el.removeEventListener('mousemove', onMove);
      el.removeEventListener('mouseleave', onLeave);
    };
  }, [active]);

  useEffect(() => {
    if (paused) return undefined;
    const id = setInterval(() => setActive(a => (a + 1) % SCREENS.length), 2500);
    return () => clearInterval(id);
  }, [paused]);

  useEffect(() => {
    const onMessage = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === 'set-screen' && typeof d.index === 'number') {
        if (d.index >= 0 && d.index < SCREENS.length) {
          setPaused(true);
          setActive(d.index);
        }
      } else if (d.type === 'resume') {
        setPaused(false);
      }
    };
    window.addEventListener('message', onMessage);
    return () => window.removeEventListener('message', onMessage);
  }, []);

  useEffect(() => {
    try { window.parent.postMessage({ type: 'screen-changed', index: active }, '*'); } catch (_) {}
  }, [active]);

  const screen = SCREENS[active];

  return (
    <div ref={stageRef} className="stage"
         onMouseEnter={() => setPaused(true)}
         onMouseLeave={() => setPaused(false)}>
      <div className="stage-orb a"></div>
      <div className="stage-orb b"></div>
      <div className="deck" style={{ transform: `rotateX(${tilt.rx}deg) rotateY(${tilt.ry}deg)`, transition:'transform .9s cubic-bezier(.2,.7,.2,1)' }}>
        <div className="layer-card" key={`card-${active}`}>
          {screen.render()}
        </div>
        {screen.floats.map((f, i) => (
          <div key={`f-${active}-${i}`}
               className={`float ${f.kind}`}
               style={{
                 left: f.x, top: f.y,
                 transform: `translate3d(0,0,${f.z}px)`,
                 animationDelay: `${i * 80}ms`,
               }}>
            {f.node}
          </div>
        ))}
      </div>
      <div className="tabrow">
        {SCREENS.map((s, i) => (
          <button key={i} className="tab"
                  data-active={i === active ? '1' : '0'}
                  onClick={() => setActive(i)}
                  onMouseEnter={() => setActive(i)}>
            <span className="idx">0{i+1}</span>
            <span>{s.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Diorama />);
</script>
</body>
</html>
